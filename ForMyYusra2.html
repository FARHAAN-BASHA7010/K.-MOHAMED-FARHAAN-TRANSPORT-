<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Yusra</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        header {
            background: linear-gradient(60deg, #ab47bc, #8e24ae);
            padding: 20px;
            text-align: center;
            color: white;
            animation: fadeIn 1s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        section {
            padding: 20px;
            margin: 20px;
            background: white;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        footer {
            text-align: center;
            padding: 10px;
            background: #333;
            color: white;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>For My Yusra</h1>
    </header>
    <section>
        <h2>Welcome to My Page!</h2>
        <p>This page is dedicated to my beloved Yusra. Here are some cool features:</p>
        <button id="featureButton">Click Me for a Surprise!</button>
        <p id="surpriseMessage" style="display:none;">Surprise! I hope you enjoy your day!</p>
    </section>
    <footer>
        <p>&copy; 2026 FARHAAN-BASHA7010</p>
    </footer>
    <script>
        document.getElementById('featureButton').addEventListener('click', function() {
            document.getElementById('surpriseMessage').style.display = 'block';
            this.style.backgroundColor = '#e91e63';
            this.style.color = '#fff';
            this.textContent = 'Thanks for clicking!';
        });
    </script>
</body>
</html>
