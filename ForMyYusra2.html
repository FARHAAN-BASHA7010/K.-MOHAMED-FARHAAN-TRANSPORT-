<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="ForMyJaan" content="width=device-width, initial-scale=1.0">
<title>Yusra ❤️ Farhaan</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle, #000814, #000);
    color: white;
    text-align: center;
}
    @media (max-width: 768px) {
    .images img {
        width: 150px;
        height: auto;
    }
    button {
        padding: 10px 20px;
    }
}
    <meta name="ForMyYusra" content="width=device-width, initial-scale=1.0">
    const audio = document.querySelector("audio");
function toggleAudio() {
    audio.paused ? audio.play() : audio.pause();
}
        

/* Stars */
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    animation: twinkle 2s infinite alternate;
}

/* Hearts */
.heart {
    position: fixed;
    bottom: -10px;
    color: red;
    animation: floatUp 6s linear infinite;
}

/* Spider */
.spider {
    position: absolute;
    top: 0;
    left: 50%;
    font-size: 40px;
    animation: swing 3s infinite ease-in-out;
}

@keyframes swing {
    0% {transform: rotate(-20deg);}
    50% {transform: rotate(20deg);}
    100% {transform: rotate(-20deg);}
}

@keyframes floatUp {
    0% {transform: translateY(0);}
    100% {transform: translateY(-100vh);}
}

@keyframes twinkle {
    from {opacity: 0.3;}
    to {opacity: 1;}
}

/* Images */
.images {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
}

.images img {
    width: 220px;
    height: 300px;
    border-radius: 20px;
    object-fit: cover;
    box-shadow: 0 0 20px red;
}

/* Ring */
.ring {
    font-size: 60px;
    animation: pop 1s infinite alternate;
}

@keyframes pop {
    from {transform: scale(1);}
    to {transform: scale(1.2);}
}

/* Buttons */
button {
    padding: 12px 25px;
    border-radius: 25px;
    margin: 10px;
    cursor: pointer;
}

#yes {
    background: red;
    color: white;
}

#no {
    background: black;
    color: red;
    border: 1px solid red;
    position: absolute;
}

h1 {
    margin-top: 60px;
    color: red;
    text-shadow: 0 0 20px red;
}
</style>
</head>

<body>

<!-- 🎵 Background Music -->
<audio autoplay loop>
    <source src="C:\Users\farha\OneDrive\Documents\project yusra\Lovely-Long-Version-chosic.com_.mp3" type="audio/mpeg">
</audio>

<!-- 🎙 Voice -->
<audio id="voice">
    <source src="voice.mp3" type="audio/mpeg">
</audio>

<div class="spider">🕷️</div>

<h1>Yusra ❤️ Farhaan</h1>

<!-- ❤️ Both Images -->
<div class="images">
    <img src="C:\Users\farha\OneDrive\Documents\project yusra\yusra.jpg">
</div>

<p style="font-size:20px; margin-top:20px;">
    You are my destiny ❤️<br>
    Will you be mine forever? 💍
</p>

<button id="yes" onclick="yesClick()">Yes ❤️</button>
<button id="no" onmouseover="moveButton()">No 😜</button>

<script>

/* Stars */
for(let i=0;i<100;i++){
 let s=document.createElement("div");
 s.className="star";
 s.style.top=Math.random()*100+"vh";
 s.style.left=Math.random()*100+"vw";
 document.body.appendChild(s);
}

/* Hearts */
setInterval(()=>{
 let h=document.createElement("div");
 h.className="heart";
 h.innerHTML="❤️";
 h.style.left=Math.random()*100+"vw";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),6000);
},300);

/* No button escape */
function moveButton(){
 let b=document.getElementById("no");
 b.style.top=Math.random()*window.innerHeight+"px";
 b.style.left=Math.random()*window.innerWidth+"px";
}

/* YES CLICK */
function yesClick(){
 document.getElementById("voice").play();

 document.body.innerHTML=`
 <h1 style="margin-top:80px;color:red;">💖 I LOVE YOU 💖</h1>
 <div class="ring">💍</div>
 <img src="C:\Users\farha\OneDrive\Documents\project yusra\yusra.jpg" width="250" style="border-radius:20px;">
 <p style="font-size:22px;">You are my forever ❤️</p>
 `;
}
</script>

</body>
</html>
